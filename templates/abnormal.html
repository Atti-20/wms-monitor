<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取消包裹监控</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚠️</text></svg>">
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <link href="/static/base.css" rel="stylesheet">
    <style>
        .wh-section-header {
            background: var(--surface-2);
            padding: 10px 16px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            transition: border-color var(--transition-normal);
        }
        .wh-section-header:hover {
            border-color: var(--border-medium);
        }
        .wh-section:first-child .wh-section-header { margin-top: 0; }

        .table-glass {
            background-color: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 16px;
        }

        /* 已处理样式 */
        .processed-row {
            opacity: 0.4;
            transition: opacity var(--transition-normal);
        }
        .processed-row:hover { opacity: 0.6; }
        .processed-row td:not(:first-child) {
            text-decoration: line-through;
            color: var(--text-dim) !important;
        }
        .form-check-input:checked {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }
        .sku-name-cell {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 表格微调 */
        .table { margin-bottom: 0; font-size: 0.82rem; }
        .table thead th {
            background: var(--surface-1);
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-medium);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 10px 10px;
        }
        .table tbody td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-subtle);
            vertical-align: middle;
            color: var(--text-secondary);
        }
        .table tbody tr:hover td {
            background: rgba(56,189,248,0.04);
            color: var(--text-main);
        }
        .table tbody tr:last-child td { border-bottom: none; }

        /* 仓库 section 渐入 */
        .wh-section {
            animation: fadeInUp var(--duration-slow) var(--ease-out) both;
        }

        /* badge 样式升级 */
        .wh-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: var(--radius-xs);
            font-weight: 600;
        }
        .wh-badge.danger {
            background: var(--danger-dim);
            color: var(--danger);
        }
        .wh-badge.success {
            background: var(--accent-green-dim);
            color: var(--accent-green);
        }

@media (max-width: 768px) {
.wh-section-header { flex-direction: column; align-items: flex-start; gap: 6px; padding: 8px 12px; margin-top: 16px; }
.table-glass { border-radius: var(--radius-sm); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.table { font-size: 0.75rem !important; min-width: 580px; }
.table th, .table td { padding: 6px 5px; white-space: nowrap; }
.sku-name-cell { max-width: 150px; }
.wh-badge { font-size: 0.65rem; padding: 2px 6px; }
}
@media (max-width: 480px) {
.wh-section-header { padding: 6px 10px; margin-top: 12px; }
.wh-section-header h5 { font-size: 0.85rem; }
.table { font-size: 0.7rem !important; }
.table th, .table td { padding: 5px 4px; }
.sku-name-cell { max-width: 120px; font-size: 0.65rem; }
.page-body { padding: 10px; }
}
    </style>
</head>
<body>
    <div class="page-header-bar">
        <h1 class="page-title"><span class="title-icon">⚠️</span> 调拨仓取消包裹监控</h1>
        <div class="header-right">
            <span id="lastUpdate" class="meta-text">刷新中...</span>
            <a href="/" class="btn-back">← 返回目录</a>
        </div>
    </div>
    <div class="page-body">
        <div id="warehouseContainer"></div>
    </div>

    <script src="/static/auth_check.js"></script>
    <script>
        async function toggleProcess(id, isChecked) {
            const row = document.getElementById(`row-${id}`);
            if (isChecked) row.classList.add('processed-row');
            else row.classList.remove('processed-row');

            try {
                await fetch('/api/abnormal_parcels/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, is_processed: isChecked ? 1 : 0 })
                });
            } catch (error) {
                console.error('状态更新失败', error);
            }
        }

        async function fetchAbnormalData() {
            try {
                const res = await fetch('/api/abnormal_parcels');
                const groupedData = await res.json();
                const container = document.getElementById('warehouseContainer');

                document.getElementById('lastUpdate').innerText = "最后更新：" + new Date().toLocaleTimeString();

                if (groupedData.length === 0) {
                    container.innerHTML = '<div class="empty-state"><h5>暂无异常包裹记录</h5><p>系统每 10 秒自动巡检，发现异常将自动展示</p></div>';
                    return;
                }

                let htmlContent = '';
                groupedData.forEach((whData, idx) => {
                    const wh = whData.warehouse;
                    const rows = whData.rows;
                    const unprocessedCount = whData.unprocessed_count;
                    const diffTotal = whData.diff_total;

                    htmlContent += `
                    <div class="wh-section" style="animation-delay: ${idx * 60}ms;">
                        <div class="wh-section-header">
                            <span>${wh}</span>
                            <span class="wh-badge ${unprocessedCount > 0 ? 'danger' : 'success'}">
                                ${unprocessedCount > 0 ? `待处理 ${unprocessedCount}条 (差${diffTotal}件)` : '已全部处理 ✓'}
                            </span>
                        </div>
                        <div class="table-glass">
                            <div class="table-responsive">
                                <table class="table table-dark mb-0">
                                    <thead>
                                        <tr>
                                            <th width="50px" class="text-center">状态</th>
                                            <th>拣货单号</th>
                                            <th>拣货人</th>
                                            <th>履约波次</th>
                                            <th>SKU编码</th>
                                            <th>品牌</th>
                                            <th>异常SKU名称</th>
                                            <th width="60px">差异</th>
                                            <th>应拣/已拣</th>
                                            <th>容器号</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${rows.map(row => {
                                            const isProcessed = row.is_processed === 1;
                                            return `
                                            <tr id="row-${row.id}" class="${isProcessed ? 'processed-row' : ''}">
                                                <td class="text-center align-middle">
                                                    <input class="form-check-input" type="checkbox" onchange="toggleProcess(${row.id}, this.checked)" ${isProcessed ? 'checked' : ''}>
                                                </td>
                                                <td style="font-size:0.78rem;">${row.zone_pick_bill_no}</td>
                                                <td>${row.handler_name || '-'}</td>
                                                <td>${row.fulfillment_wave_name || '-'}</td>
                                                <td style="font-size:0.78rem;">${row.sku_code || '-'}</td>
                                                <td><span class="status-badge info">${row.sku_brand || '-'}</span></td>
                                                <td class="sku-name-cell" title="${row.sku_name}">${row.sku_name}</td>
                                                <td style="color:var(--danger); font-weight:700;">+${row.qty_diff}</td>
                                                <td style="font-weight:600;">${row.sku_parcel_qty || 0} <span style="color:var(--text-dim);">/</span> ${row.sku_pick_qty || 0}</td>
                                                <td style="font-size:0.75rem; color:var(--text-muted);">${row.receptacle_code || '-'}</td>
                                            </tr>`;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;
                });

                container.innerHTML = htmlContent;
            } catch (error) { console.error("加载失败:", error); }
        }

        fetchAbnormalData();
        setInterval(fetchAbnormalData, 10000);

        window.addEventListener('beforeunload', function() {
            navigator.sendBeacon('/api/deactivate');
        });
    </script>
</body>
</html>

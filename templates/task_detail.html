<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务包裹明细</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <link href="/static/base.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .fixed-top-area {
            flex-shrink: 0;
            padding: 0 var(--spacing-page) 0 var(--spacing-page);
            background: var(--dark-bg);
            border-bottom: 1px solid var(--border-subtle);
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 var(--spacing-page) var(--spacing-page) var(--spacing-page);
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 16px;
        }
        .page-header h2 { margin: 0; font-size: 1.15rem; font-weight: 700; }

        .info-bar {
            display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap;
            align-items: center; padding: 12px 16px;
            background: var(--card-bg); border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            transition: border-color var(--transition-normal);
        }
        .info-bar:hover { border-color: var(--border-medium); }
        .info-item { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }
        .info-item strong { color: var(--text-main); margin-left: 6px; font-weight: 600; }

        .summary-cards {
            display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .summary-card {
            background: var(--card-bg); border-radius: var(--radius-md); padding: 14px 18px;
            border: 1px solid var(--border-subtle); min-width: 120px;
            transition: border-color var(--transition-normal), transform var(--transition-normal);
        }
        .summary-card:hover { border-color: var(--border-medium); transform: translateY(-1px); }
        .summary-card .label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
        .summary-card .value { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
        .summary-card .value.blue { color: var(--accent-blue); }
        .summary-card .value.green { color: var(--accent-green); }
        .summary-card .value.orange { color: var(--accent-orange); }
        .summary-card .value.purple { color: var(--accent-purple); }

        .data-panel {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            transition: border-color var(--transition-normal);
        }
        .data-panel:hover { border-color: var(--border-medium); }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        thead th {
            padding: 10px 12px; text-align: left; font-weight: 600;
            color: var(--text-secondary); border-bottom: 1px solid var(--border-subtle);
            white-space: nowrap; font-size: 0.78rem;
            background: var(--card-bg);
            position: sticky; top: 0; z-index: 10;
        }
        tbody td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        tbody tr:hover { background: rgba(255,255,255,0.03); }

        .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 0.9rem; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }
            .fixed-top-area { padding: 0 14px; }
            .scroll-area { padding: 0 14px 14px; }
            .info-bar { flex-direction: column; gap: 8px; padding: 10px 14px; }
            .info-item { font-size: 0.78rem; }
            .summary-cards { gap: 8px; }
            .summary-card { padding: 12px 14px; min-width: 100px; flex: 1 1 calc(50% - 8px); }
            .summary-card .value { font-size: 1.1rem; }
            .data-panel { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            table { min-width: 500px; font-size: 0.78rem; }
            thead th, tbody td { padding: 7px 8px; }
        }
        @media (max-width: 480px) {
            .fixed-top-area { padding: 0 10px; }
            .scroll-area { padding: 0 10px 10px; }
            .page-header { padding: 10px 0; margin-bottom: 12px; }
            .page-header h2 { font-size: 1rem; }
            .info-bar { padding: 8px 10px; border-radius: var(--radius-sm); }
            .info-item { font-size: 0.75rem; }
            .summary-cards { flex-direction: column; gap: 6px; }
            .summary-card { flex: none; min-width: unset; padding: 10px 12px; border-radius: var(--radius-sm); }
            .summary-card .value { font-size: 1rem; }
            .summary-card .label { font-size: 0.68rem; }
            .data-panel { border-radius: var(--radius-sm); }
            table { min-width: 420px; font-size: 0.72rem; }
            thead th, tbody td { padding: 6px; }
            .empty-msg { padding: 30px 16px; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <!-- 固定顶部区域 -->
    <div class="fixed-top-area">
        <div class="page-header">
            <div>
                <h2>📋 任务包裹明细</h2>
            </div>
            <a href="/created_bills" class="btn-back">← 返回子任务列表</a>
        </div>

        <div class="info-bar" id="infoBar" style="display:none;">
            <div class="info-item">子任务号: <strong id="infoBillNo">-</strong></div>
            <div class="info-item">调入仓: <strong id="infoWarehouse">-</strong></div>
            <div class="info-item">逻辑区: <strong id="sumLogicArea">-</strong></div>
            <div class="info-item">履约日期: <strong id="infoDate">-</strong></div>
            <div class="info-item">包裹总数: <strong id="sumTotal" style="color:var(--accent-blue);">0</strong></div>
            <div class="info-item">SKU品类: <strong id="sumSkuCategory" style="color:var(--accent-purple);">0</strong></div>
            <div class="info-item">SKU总量: <strong id="sumSkuQty" style="color:var(--accent-green);">0</strong></div>
            <div class="info-item">已打印: <strong id="sumPrintCount" style="color:var(--accent-orange);">0</strong></div>
            <div class="info-item">最新打印: <strong id="sumLastPrint">-</strong></div>
        </div>
        <div id="detailTitle" style="display:none; font-size:0.95rem; font-weight:700; margin-top:12px; padding-bottom:8px; color:var(--accent-blue);">
            📋 包裹SKU明细 <span id="detailCount" style="font-size:0.8rem; font-weight:400; color:#94a3b8;"></span>
        </div>
    </div>

    <!-- 可滚动表格区域 -->
    <div class="scroll-area">
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <div>正在查询包裹数据...</div>
        </div>

        <!-- 包裹SKU明细 -->
        <div id="detailSection" style="display:none;">
            <div class="data-panel">
                <table>
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>包裹号</th>
                            <th>SKU名称</th>
                            <th>单位</th>
                            <th>订单号</th>
                            <th>客户</th>
                            <th>库区</th>
                            <th>站点</th>
                            <th>路线序</th>
                            <th>POI编码</th>
                            <th>温层</th>
                        </tr>
                    </thead>
                    <tbody id="detailBody"></tbody>
                </table>
            </div>
        </div>
        <div class="loading-state" id="detailLoading" style="display:none;">
            <div class="spinner"></div>
            <div>正在加载包裹明细...</div>
        </div>
    </div>

    <script src="/static/auth_check.js"></script>
    <script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const zonePickBillNo = urlParams.get('zonePickBillNo') || '';
        const allotInWarehouseId = urlParams.get('allotInWarehouseId') || '';
        const appointmentTime = urlParams.get('appointmentTime') || '';
        const logicAreaName = urlParams.get('logicAreaName') || '';

        if (!zonePickBillNo) {
            document.getElementById('loadingState').innerHTML =
                '<div style="color:#ff5252;">缺少子任务号参数</div>';
            return;
        }

        if (!allotInWarehouseId) {
            document.getElementById('loadingState').innerHTML =
                '<div style="color:#ff9800;">⚠️ 该仓库未在映射表中，无法查询包裹数据。<br><small>请联系管理员添加仓库ID映射。</small></div>';
            return;
        }

        async function fetchData() {
            try {
                const params = new URLSearchParams({
                    zonePickBillNo,
                    allotInWarehouseId,
                    appointmentTime,
                });
                const res = await fetch(`/api/task_detail?${params.toString()}`);
                const json = await res.json();

                if (!json.ok) {
                    document.getElementById('loadingState').innerHTML =
                        `<div style="color:#ff5252;">${json.msg || '查询失败'}</div>`;
                    return;
                }

                const data = json.data || [];
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('infoBar').style.display = '';

                document.getElementById('infoBillNo').textContent = zonePickBillNo;
                document.getElementById('infoWarehouse').textContent =
                    data.length > 0 ? (data[0].allotInWarehouseName || '-') : '-';
                document.getElementById('sumLogicArea').textContent = logicAreaName || '-';
                document.getElementById('infoDate').textContent = appointmentTime || '-';

                // 统计汇总
                let totalParcel = 0, totalSkuCategory = 0, totalSkuQty = 0;
                let printedCount = 0, lastPrintTime = '';
                data.forEach(item => {
                    totalParcel += (item.parcelQty || 0);
                    totalSkuCategory += (item.skuCategoryQty || 0);
                    totalSkuQty += (item.skuQty || 0);
                    if (item.containerPrintTaskStatus === 'PRINTED') printedCount++;
                    if (item.printTime && item.printTime > lastPrintTime) lastPrintTime = item.printTime;
                });
                document.getElementById('sumTotal').textContent = totalParcel;
                document.getElementById('sumSkuCategory').textContent = totalSkuCategory;
                document.getElementById('sumSkuQty').textContent = totalSkuQty;
                document.getElementById('sumPrintCount').textContent = printedCount;
                document.getElementById('sumLastPrint').textContent = lastPrintTime || '-';

                // 加载包裹 SKU 明细
                fetchDetail();
            } catch(e) {
                document.getElementById('loadingState').innerHTML =
                    '<div style="color:#ff5252;">网络异常</div>';
            }
        }

        async function fetchDetail() {
            document.getElementById('detailLoading').style.display = '';
            try {
                const params = new URLSearchParams({
                    zonePickBillNo,
                    allotInWarehouseId,
                    appointmentTime,
                });
                const res = await fetch(`/api/task_detail_parcels?${params.toString()}`);
                const json = await res.json();

                document.getElementById('detailLoading').style.display = 'none';

                if (!json.ok) {
                    document.getElementById('detailTitle').style.display = '';
                    document.getElementById('detailSection').style.display = '';
                    document.getElementById('detailBody').innerHTML =
                        `<tr><td colspan="11" class="empty-msg">${json.msg || '加载失败'}</td></tr>`;
                    return;
                }

                const parcels = json.data || [];
                document.getElementById('detailTitle').style.display = '';
                document.getElementById('detailSection').style.display = '';
                document.getElementById('detailCount').textContent = `（共 ${parcels.length} 条）`;
                renderDetail(parcels);
            } catch(e) {
                document.getElementById('detailLoading').style.display = 'none';
                document.getElementById('detailTitle').style.display = '';
                document.getElementById('detailSection').style.display = '';
                document.getElementById('detailBody').innerHTML =
                    '<tr><td colspan="11" class="empty-msg">加载明细失败</td></tr>';
            }
        }

        function renderDetail(parcels) {
            const tbody = document.getElementById('detailBody');
            if (parcels.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="empty-msg">暂无包裹明细</td></tr>';
                return;
            }

            let html = '';
            parcels.forEach((p, idx) => {
                const skuDisplay = p.skuUnitDesc ? `${p.skuName}` : p.skuName;
                html += `<tr>
                    <td>${idx + 1}</td>
                    <td>${p.packageNo || '-'}</td>
                    <td>${skuDisplay || '-'}</td>
                    <td>${p.skuUnitDesc || '-'}</td>
                    <td style="font-size:0.75rem;">${p.orderNo || '-'}</td>
                    <td>${p.customerName || '-'}</td>
                    <td>${p.areaNo || '-'}</td>
                    <td>${p.stationAreaNo || '-'}</td>
                    <td>${p.stationRouteSeq || '-'}</td>
                    <td>${p.poiSerialCode || '-'}</td>
                    <td>${p.transportCategoryAbbr || '-'}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        fetchData();
    })();
    </script>
</body>
</html>
